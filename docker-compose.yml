services:
  mcp-server:
    build: .
    ports:
      - "${PORT:-8000}:8000"
      - "${OAUTH_PORT:-8080}:8080"
    volumes:
      - .:/app
      - /app/__pycache__
      - ./credentials:/app/credentials
    environment:
      - MCP_API_KEY=${MCP_API_KEY}
      - CREDENTIALS_FILE=/app/credentials/client_secrets.json
      - TOKEN_FILE=/app/credentials/token.pickle
      - OAUTH_PORT=${OAUTH_PORT:-8080}
      - PORT=8000
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
